{% extends 'base.html' %}

{% block title %}Forgot Password{% endblock %}

{% block content %}
<div class="checkout-container">
    <div class="auth-container">
        <div class="card auth-card">
            <div class="card-header">
                <h3>Reset Password</h3>
                <div class="secure-badge">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16" class="lock-icon">
                        <path d="M8 1a2 2 0 0 1 2 2v4H6V3a2 2 0 0 1 2-2zm3 6V3a3 3 0 0 0-6 0v4a2 2 0 0 0-2 2v5a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/>
                    </svg>
                    <span>Secure Reset</span>
                </div>
            </div>
            <div class="card-body">
                <form method="POST" class="auth-form">
                    {{ form.hidden_tag() }}
                    
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <div class="input-wrapper">
                            {{ form.email(class="form-control", placeholder="Enter your email") }}
                        </div>
                    </div>

                    <button type="submit" class="auth-button">
                        <span class="button-content">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
                                <path d="M4 8a4 4 0 0 1 8 0v2h2V8a6 6 0 1 0-12 0v2h2V8z"/>
                                <path d="M12 10v3H4v-3H2v3a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2v-3h-2z"/>
                            </svg>
                            <span>Send Reset Link</span>
                        </span>
                    </button>
                </form>

                <div class="auth-footer">
                    <p>Remember your password? <a href="{{ url_for('login') }}" class="auth-link">Login here</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
